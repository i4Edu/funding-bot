# Non-secret runtime configuration shared by the web deployment and cron job.
apiVersion: v1
kind: ConfigMap
metadata:
  name: funding-bot-config
  namespace: funding-bot
  labels:
    app: funding-bot
data:
  SMTP_HOST: "localhost"
  SMTP_PORT: "587"
  SMTP_USE_TLS: "1"
  SMTP_FROM: ""
  BOT_DB_PATH: "/app/data/funding_bot.db"
  DATA_RESIDENCY: "US"
  DATA_STORAGE_REGION: "US"
  PRIVACY_POLICY_OUTPUT_DIR: "/app/data/privacy_policies"
  RETENTION_AUDIT_LOG_DAYS: "365"
  RETENTION_COMMUNICATION_DAYS: "365"
  RETENTION_DOCUMENT_DAYS: "180"
  RETENTION_SUBMISSION_ATTEMPT_DAYS: "90"
  RETENTION_COMPLETED_TASK_DAYS: "180"
  ENABLE_TASK_QUEUE: "0"
  ENABLE_LEGACY_CRON: "1"
  CELERY_BROKER_URL: "redis://funding-bot-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://funding-bot-redis:6379/1"
  CELERY_QUEUE_NAME: "funding-bot"
  CELERY_TASK_ALWAYS_EAGER: "0"
