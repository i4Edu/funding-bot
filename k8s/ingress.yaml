# Public ingress for the dashboard. Replace the host/TLS secret to match your environment.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: funding-bot
  namespace: funding-bot
  labels:
    app: funding-bot
    component: web
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - funding-bot.example.com
      secretName: funding-bot-tls
  rules:
    - host: funding-bot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: funding-bot
                port:
                  number: 80
