# Web deployment for the funding bot dashboard and API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: funding-bot
  namespace: funding-bot
  labels:
    app: funding-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: funding-bot
      component: web
  template:
    metadata:
      labels:
        app: funding-bot
        component: web
    spec:
      containers:
        - name: funding-bot-web
          image: funding-bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - flask
            - --app
            - web.app
            - run
            - --host
            - 0.0.0.0
            - --port
            - "5000"
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: funding-bot-config
            - secretRef:
                name: funding-bot-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: bot-data
              mountPath: /app/data
      volumes:
        # Shared persistent storage for the SQLite database file.
        - name: bot-data
          persistentVolumeClaim:
            claimName: funding-bot-data
