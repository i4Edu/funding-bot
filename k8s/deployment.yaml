# Dashboard deployment for the funding bot web UI and API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: funding-bot
  namespace: funding-bot
  labels:
    app: funding-bot
    component: web
    app.kubernetes.io/name: funding-bot
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: funding-bot
      component: web
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "5000"
      labels:
        app: funding-bot
        component: web
        app.kubernetes.io/name: funding-bot
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: funding-bot-web
          image: ghcr.io/example/funding-bot:v1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - flask
            - --app
            - web.app
            - run
            - --host
            - 0.0.0.0
            - --port
            - "5000"
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: funding-bot-config
            - secretRef:
                name: funding-bot-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: bot-data
              mountPath: /app/data
      volumes:
        - name: bot-data
          persistentVolumeClaim:
            claimName: funding-bot-data
