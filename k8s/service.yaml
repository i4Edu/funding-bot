# Stable ClusterIP service for the dashboard.
apiVersion: v1
kind: Service
metadata:
  name: funding-bot
  namespace: funding-bot
  labels:
    app: funding-bot
    component: web
spec:
  type: ClusterIP
  selector:
    app: funding-bot
    component: web
  ports:
    - name: http
      port: 80
      targetPort: http
