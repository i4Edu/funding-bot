# Template secret for sensitive settings.
# Replace every placeholder with a real secret value before applying.
# In production, prefer Sealed Secrets, External Secrets Operator, or Vault-backed delivery.
apiVersion: v1
kind: Secret
metadata:
  name: funding-bot-secrets
  namespace: funding-bot
  labels:
    app: funding-bot
type: Opaque
stringData:
  SMTP_USERNAME: "<SMTP_USERNAME>"
  SMTP_PASSWORD: "<SMTP_PASSWORD>"
  ADMIN_PASSWORD: "<ADMIN_PASSWORD>"
  STAFF_PASSWORD: "<STAFF_PASSWORD>"
  AUDITOR_PASSWORD: "<AUDITOR_PASSWORD>"
