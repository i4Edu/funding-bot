# Template secret for sensitive settings.
# Replace every placeholder with a real base64-encoded value before applying:
#   echo -n 'your-value' | base64
# In production, prefer Sealed Secrets, External Secrets Operator, or Vault-backed delivery.
apiVersion: v1
kind: Secret
metadata:
  name: funding-bot-secrets
  namespace: funding-bot
  labels:
    app: funding-bot
type: Opaque
data:
  SMTP_USERNAME: <BASE64_ENCODED_SMTP_USERNAME>
  SMTP_PASSWORD: <BASE64_ENCODED_SMTP_PASSWORD>
  ADMIN_PASSWORD: <BASE64_ENCODED_ADMIN_PASSWORD>
  STAFF_PASSWORD: <BASE64_ENCODED_STAFF_PASSWORD>
  AUDITOR_PASSWORD: <BASE64_ENCODED_AUDITOR_PASSWORD>
