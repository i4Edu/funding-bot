[mutmut]
paths_to_mutate =
    web/app.py
    task_queue.py
also_copy =
    tests/
    pytest.ini
    funding_bot.py
    cache_manager.py
    cli_config.py
    database.py
    observability.py
    warehouse_exports.py
    celery_app.py
    tasks/
    web/
    i18n/
    migrations/
only_mutate =
    web/app.py
    task_queue.py
do_not_mutate =
    tests/*.py
    tests/**/*.py
tests_dir =
    tests/test_mutation_baseline.py
mutate_only_covered_lines = true
max_stack_depth = 8
timeout_multiplier = 2.0
timeout_constant = 5.0
