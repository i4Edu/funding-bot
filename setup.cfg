[mutmut]
paths_to_mutate =
    web/app.py
    task_queue.py
also_copy =
    web/templates/
    web/static/
    i18n/
    migrations/
only_mutate =
    web/app.py
    task_queue.py
do_not_mutate =
    tests/*.py
    tests/**/*.py
tests_dir =
    tests/test_web_app.py
    tests/test_celery_tasks.py
    tests/test_collaboration.py
mutate_only_covered_lines = true
max_stack_depth = 8
timeout_multiplier = 2.0
timeout_constant = 5.0
