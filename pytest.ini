[pytest]
addopts = -ra --strict-markers -n auto --dist loadscope
python_files = test_*.py
testpaths = tests
markers =
    quick: fast pytest checks for core workflows
    smoke: broad end-to-end smoke coverage
    serial: test should stay on one worker
norecursedirs = .git .hypothesis node_modules generated .pytest-artifacts .test-artifacts .test-smoke-artifacts
