name: Update Regression Snapshots

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to update snapshots from"
        required: false
        default: ""

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install regression test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Regenerate regression snapshots
        run: python scripts/snapshot_tool.py update

      - name: Show snapshot diff
        run: git --no-pager diff -- tests/__snapshots__

      - name: Upload refreshed snapshots
        uses: actions/upload-artifact@v4
        with:
          name: regression-snapshots
          path: tests/__snapshots__
