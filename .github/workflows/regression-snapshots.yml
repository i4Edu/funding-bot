name: Regression and Snapshot Validation

on:
  push:
  pull_request:

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install regression test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run regression suite
        run: python -m pytest tests/test_regression.py -q

      - name: Validate committed snapshots
        run: python scripts/snapshot_tool.py validate
