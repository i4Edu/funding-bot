minimum_pre_commit_version: "3.7.0"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check --fix
        language: system
        files: \.pyi?$

      - id: black
        name: black
        entry: python -m black
        language: system
        files: \.pyi?$

      - id: isort
        name: isort
        entry: python -m isort
        language: system
        files: \.pyi?$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^(celery_app\.py|task_queue\.py|tasks/.*\.py|web/.*\.py)$
        args: [--python-version=3.12, --ignore-missing-imports, --follow-imports=skip]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        files: ^(celery_app\.py|task_queue\.py|tasks/.*\.py|web/.*\.py)$
        args: [-q, -s, B105]

  - repo: local
    hooks:
      - id: safety-root
        name: safety (requirements.txt)
        entry: safety
        language: python
        additional_dependencies: [safety==2.3.5]
        pass_filenames: false
        files: ^requirements\.txt$
        args: [check, -r, requirements.txt, --full-report]

      - id: safety-web
        name: safety (web/requirements.txt)
        entry: safety
        language: python
        additional_dependencies: [safety==2.3.5]
        pass_filenames: false
        files: ^web/requirements\.txt$
        args: [check, -r, web/requirements.txt, --full-report]

      - id: pip-audit-root
        name: pip-audit (requirements.txt)
        entry: pip-audit
        language: python
        additional_dependencies: [pip-audit==2.10.1]
        pass_filenames: false
        files: ^requirements\.txt$
        args: [-r, requirements.txt]

      - id: pip-audit-web
        name: pip-audit (web/requirements.txt)
        entry: pip-audit
        language: python
        additional_dependencies: [pip-audit==2.10.1]
        pass_filenames: false
        files: ^web/requirements\.txt$
        args: [-r, web/requirements.txt]
