<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Nonprofit Funding Bot{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      .skip-link {
        position: absolute;
        top: 0;
        left: 1rem;
        transform: translateY(-140%);
        padding: 0.75rem 1rem;
        background: #ffffff;
        color: #146c43;
        border: 2px solid #146c43;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        text-decoration: none;
        z-index: 2000;
      }

      .skip-link:focus {
        transform: translateY(0.75rem);
        outline: 3px solid #0d6efd;
        outline-offset: 2px;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="{% block body_class %}bg-light{% endblock %}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm" role="navigation" aria-label="Primary navigation">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Nonprofit Funding Bot</span>
        {% block nav_links %}{% endblock %}
        <span class="navbar-text text-white-50">Role: {{ current_role }}</span>
      </div>
    </nav>

    <main id="main-content" class="{% block main_class %}container py-4{% endblock %}">
      {% block main_content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
