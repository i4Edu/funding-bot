<!doctype html>
<html lang="{{ ui_locale.code if ui_locale is defined else 'en' }}" dir="{{ ui_locale.direction if ui_locale is defined else 'ltr' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token is defined else '' }}">
    <title>{% block title %}Nonprofit Funding Bot{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <style>
      .skip-link {
        position: absolute;
        top: 0;
        left: 1rem;
        transform: translateY(-140%);
        padding: 0.75rem 1rem;
        background: #ffffff;
        color: #146c43;
        border: 2px solid #146c43;
        border-radius: 0.5rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        text-decoration: none;
        z-index: 2000;
      }

      .skip-link:focus {
        transform: translateY(0.75rem);
        outline: 3px solid #0d6efd;
        outline-offset: 2px;
      }

      .rtl-safe,
      .rtl-safe th,
      .rtl-safe td,
      .rtl-safe input,
      .rtl-safe textarea,
      .rtl-safe select {
        text-align: start;
      }

      .rtl-safe-list {
        padding-inline-start: 1.25rem;
      }

      .rtl-safe-pre {
        direction: inherit;
        text-align: start;
        unicode-bidi: plaintext;
      }

      .locale-chip {
        font-size: 0.75rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      [dir="rtl"] .navbar .container-fluid,
      [dir="rtl"] .rtl-row-reverse {
        flex-direction: row-reverse;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="funding-app {% block body_class %}bg-light{% endblock %}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm rtl-safe app-navbar" role="navigation" aria-label="Primary navigation">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Nonprofit Funding Bot</span>
        {% block nav_links %}{% endblock %}
        <span class="navbar-text app-role-chip" aria-label="Signed in as {{ current_role }}">Role: {{ current_role }}</span>
      </div>
    </nav>

    <main id="main-content" class="{% block main_class %}container py-4{% endblock %}" tabindex="-1">
      {% block main_content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
